name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore VidSlice.slnx

      - name: Build
        run: dotnet build VidSlice.slnx -c Release --no-restore

      # Integration tests auto-skip unless VIDSLICE_TEST_INPUT is set, so CI runs
      # the fast, ffmpeg-free unit suite only.
      - name: Test
        run: dotnet test VidSlice.slnx -c Release --no-build --verbosity normal
